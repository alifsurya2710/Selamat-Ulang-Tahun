<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Spesial</title>
    <!-- Tambahkan library html2canvas untuk fitur download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;600;700&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            font-family: 'Outfit', sans-serif;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* Area yang akan diubah menjadi foto */
        .capture-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 60px 50px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 107, 129, 0.15),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .capture-area::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255,154,158,0.2) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }

        .capture-area::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(254,207,239,0.3) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }

        .title {
            margin-bottom: 30px;
            color: #ff4b68; /* Premium pink */
            font-family: 'Dancing Script', cursive;
            font-size: 46px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
        }

        .heart-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0px 10px 20px rgba(255, 107, 129, 0.3));
            z-index: 2;
        }

        .heart {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            mask-image: path('M130,72.8C130,72.8,108,30.8,63.3,30.8C18.7,30.8,0,68.5,0,107.1c0,38.4,39.3,87.8,130,149.9C220.7,194.9,260,145.5,260,107.1C260,68.5,241.3,30.8,196.7,30.8C152,30.8,130,72.8,130,72.8z');
            -webkit-mask-image: path('M130,72.8C130,72.8,108,30.8,63.3,30.8C18.7,30.8,0,68.5,0,107.1c0,38.4,39.3,87.8,130,149.9C220.7,194.9,260,145.5,260,107.1C260,68.5,241.3,30.8,196.7,30.8C152,30.8,130,72.8,130,72.8z');
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-position: center;
            z-index: 1;
        }

        .heart-inner {
            position: absolute;
            width: 90%;
            height: 90%;
            background-color: #ffffff;
            mask-image: path('M117,65.5C117,65.5,97.2,27.7,57,27.7C16.8,27.7,0,61.7,0,96.4c0,34.6,35.4,79,117,134.9C198.6,175.4,234,131,234,96.4C234,61.7,217.2,27.7,177,27.7C136.8,27.7,117,65.5,117,65.5z');
            -webkit-mask-image: path('M117,65.5C117,65.5,97.2,27.7,57,27.7C16.8,27.7,0,61.7,0,96.4c0,34.6,35.4,79,117,134.9C198.6,175.4,234,131,234,96.4C234,61.7,217.2,27.7,177,27.7C136.8,27.7,117,65.5,117,65.5z');
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-position: center;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateY(-2px);
        }

        .qr-code {
            z-index: 3;
            width: 140px;
            height: 140px;
            margin-top: -10px;
            /* Tambahkan sedikit border radius agar terlihat manis */
            border-radius: 8px;
        }
        
        .subtitle {
            margin-top: 35px;
            color: #666;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        /* Tombol download */
        .btn-download {
            margin-top: 40px;
            padding: 16px 36px;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10;
        }

        .btn-download:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(255, 117, 140, 0.4);
        }
    </style>
</head>
<body>

    <div class="capture-area" id="capture">
        <div class="title">Spesial Untuk Kamu</div>

        <div class="heart-container">
            <div class="heart"></div>
            <div class="heart-inner">
                <!-- Kita akan load QR code ini -->
                <img class="qr-code" crossorigin="anonymous" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https%3A%2F%2Fselamat-ulang-tahun-kamu.vercel.app%2F" alt="QR Code">
            </div>
        </div>

        <div class="subtitle">Scan Ini Yaa!</div>
    </div>

    <!-- Tombol untuk mengunduh gambar -->
    <button class="btn-download" onclick="downloadImage()">
        <svg style="width: 20px; height: 20px; vertical-align: middle; margin-right: 8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        Simpan Desain Terbaik Ini
    </button>

    <script>
        // Pastikan font dimuat sebelum bisa download
        async function downloadImage() {
            const btn = document.querySelector('.btn-download');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Memproses...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            // Menunggu font selesai dimuat untuk menghindari blur pada teks
            await document.fonts.ready;

            const captureArea = document.getElementById('capture');
            const originalBoxShadow = captureArea.style.boxShadow;
            
            // Hapus shadow luar agar hasil potongannya rapi
            captureArea.style.boxShadow = 'none';

            // Skala tinggi (scale: 4) untuk mencegah blur
            html2canvas(captureArea, {
                useCORS: true,
                backgroundColor: "#ffffff",
                scale: 4, 
                logging: false
            }).then(canvas => {
                captureArea.style.boxShadow = originalBoxShadow;
                
                const link = document.createElement('a');
                link.download = 'qrcode-love-premium.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();

                // Kembalikan tombol
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }).catch(err => {
                captureArea.style.boxShadow = originalBoxShadow;
                alert("Gagal membuat gambar otomatis. Silakan ambil screenshot secara manual.");
                console.error(err);
                
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            });
        }
    </script>
</body>
</html>
