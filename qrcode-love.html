<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Spesial</title>
    <!-- Tambahkan library html2canvas untuk fitur download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;700&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf5f6;
            margin: 0;
            font-family: 'Nunito', sans-serif;
            flex-direction: column;
        }

        /* Area yang akan diubah menjadi foto */
        .capture-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 50px 40px;
            background-color: #ffffff;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.15); /* Soft pink glow */
            position: relative;
        }

        .title {
            margin-bottom: 25px;
            color: #ff6b81; /* Premium pink */
            font-family: 'Dancing Script', cursive;
            font-size: 38px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(255, 107, 129, 0.2);
        }

        .heart-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0px 8px 15px rgba(255, 182, 193, 0.6));
        }

        .heart {
            position: absolute;
            width: 280px;
            height: 280px;
            /* Gradient pink-red cantik */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            mask-image: path('M140,78.4C140,78.4,116.3,33.2,68.2,33.2C20.1,33.2,0,73.8,0,115.3c0,41.4,42.3,94.6,140,161.4C237.7,209.9,280,156.7,280,115.3C280,73.8,259.9,33.2,211.8,33.2C163.7,33.2,140,78.4,140,78.4z');
            -webkit-mask-image: path('M140,78.4C140,78.4,116.3,33.2,68.2,33.2C20.1,33.2,0,73.8,0,115.3c0,41.4,42.3,94.6,140,161.4C237.7,209.9,280,156.7,280,115.3C280,73.8,259.9,33.2,211.8,33.2C163.7,33.2,140,78.4,140,78.4z');
            mask-size: cover;
            -webkit-mask-size: cover;
            z-index: 1;
        }

        .heart-inner {
            position: absolute;
            width: 240px;
            height: 240px;
            background-color: white;
            mask-image: path('M120,67.2C120,67.2,99.7,28.5,58.5,28.5C17.3,28.5,0,63.3,0,98.8c0,35.5,36.2,81.1,120,138.3C203.8,179.9,240,134.3,240,98.8C240,63.3,222.7,28.5,181.5,28.5C140.3,28.5,120,67.2,120,67.2z');
            -webkit-mask-image: path('M120,67.2C120,67.2,99.7,28.5,58.5,28.5C17.3,28.5,0,63.3,0,98.8c0,35.5,36.2,81.1,120,138.3C203.8,179.9,240,134.3,240,98.8C240,63.3,222.7,28.5,181.5,28.5C140.3,28.5,120,67.2,120,67.2z');
            mask-size: cover;
            -webkit-mask-size: cover;
            z-index: 2;
            transform: scale(0.88) translateY(-3px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-code {
            z-index: 3;
            width: 135px;
            height: 135px;
            margin-top: -15px;
        }
        
        .subtitle {
            margin-top: 30px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Tombol download */
        .btn-download {
            margin-top: 35px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #ff4757;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.6);
            color: #ff3b4e;
        }
    </style>
</head>
<body>

    <div class="capture-area" id="capture">
        <div class="title">Spesial Untuk Kamu</div>

        <div class="heart-container">
            <div class="heart"></div>
            <div class="heart-inner">
                <img class="qr-code" crossorigin="anonymous" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https%3A%2F%2Fselamat-ulang-tahun-kamu.vercel.app%2F" alt="QR Code">
            </div>
        </div>

        <div class="subtitle">Scan Ini Yaa!</div>
    </div>

    <!-- Tombol untuk mengunduh gambar -->
    <button class="btn-download" onclick="downloadImage()">⬇️ Simpan Desain Terbaik Ini</button>

    <script>
        function downloadImage() {
            const captureArea = document.getElementById('capture');
            const originalBoxShadow = captureArea.style.boxShadow;
            
            captureArea.style.boxShadow = 'none';

            html2canvas(captureArea, {
                useCORS: true,
                backgroundColor: "#ffffff",
                scale: 3
            }).then(canvas => {
                captureArea.style.boxShadow = originalBoxShadow;
                const link = document.createElement('a');
                link.download = 'qrcode-love-premium.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                captureArea.style.boxShadow = originalBoxShadow;
                alert("Gagal membuat gambar otomatis. Silakan ambil screenshot/tangkapan layar secara manual.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
